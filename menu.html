<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Menú Principal</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Menú Principal</h2>
      <div class="balance-card">
        <p>Dinero en cuenta:</p>
        <h3 id="saldo">$60,000</h3>
      </div>
      <button id="btnDepositar" class="btn btn-primary btn-block">Depositar</button>
      <button id="btnEnviar" class="btn btn-info btn-block">Enviar Dinero</button>
      <button id="btnMovimientos" class="btn btn-secondary btn-block">Últimos Movimientos</button>
      <button id="btnSalir" class="btn btn-danger btn-block">Salir</button>
      <div id="mensajeRedireccion" class="mt-3 text-center text-muted"></div>
      <footer>Wallet para práctica.</footer>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="menu.js"></script>
</body>
</html>
