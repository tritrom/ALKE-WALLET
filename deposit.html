<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Depositar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Depositar</h2>
      <p id="saldoActual" class="text-muted mb-3">Saldo actual: $0</p>
      <form id="formularioDeposito">
        <div class="form-group">
          <label for="monto">Monto a depositar:</label>
          <input type="number" class="form-control" id="monto" placeholder="Ingresa el monto" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Realizar depósito</button>
      </form>
      <div id="alert-container" class="mt-3"></div>
      <div id="depositMessage" class="mt-2 text-success"></div>
      <a href="menu.html" class="btn btn-secondary btn-block">Volver al Menú Principal</a>
      <footer>Práctica de depósito con un formulario.</footer>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="deposit.js"></script>
</body>
</html>
